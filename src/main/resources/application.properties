quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=kcUser
quarkus.datasource.password=ksPassword
quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/keykloack

quarkus.oidc.auth-server-url=http://127.0.0.1:8081/realms/dive-dev

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=true

quarkus.swagger-ui.path=/swagger-ui

quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=JWT

quarkus.http.port=8080